<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mélange crews | Log In</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="css/footer.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
</head>
<body>
    <nav id="navbar">
        <div id="nav-element-wrapper">
            <div>
                <a href="home.html"><img src="asset/IMG_0237-removebg-preview.png" id="nav-logo" alt="mélange crews logo"></a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="login-container">
            <div class="login-header">
                <h1 class="login-title">Welcome back, mérangers!</h1>
                <p class="login-subtitle">Sign in to your account to access services and manage your bookings on mèlange crews.</p>
            </div>

            <!-- Alert Messages -->
            <div id="alertMessage" class="alert">
                <span id="alertText"></span>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input"
                        placeholder="Enter your email address"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="password-field">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" class="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" onclick="handleForgotPassword()">Forgot password?</a>
                </div>

                <button type="submit" class="login-button" id="loginBtn">
                    Sign in
                </button>
            </form>

            <!-- Sign Up Link -->
            <div class="signup-prompt">
                Don't have an account? <a href="sign_up.html" class="signup-link" onclick="handleSignup()">Sign up here</a>
            </div>
        </div>
    </main>

    <footer>
        <div id="inner-footer-wrapper">
            <div>
                <a href="html/home.html"><img class="logo-footer" src="asset/IMG_0237-removebg-preview.png" alt=""></a>
            </div>
            <div class="menu-contact-wrapper">
                <div class="footer-menu-wrapper">
                    <a href="home.html"><b>Mélange Crews</b></a>
                    <a href="#">About Us</a>
                    <a href="#">Testimony</a>
                    <a href="product.html">Services</a>
                </div>
                <div class="footer-menu-wrapper">
                    <a href="#"><b>Help & Guidelines</b></a>
                    <a href="#">Contact Us</a>
                    <a href="#">FAQs</a>
                    <a href="#">Help</a>
                </div>
                <div class="footer-menu-wrapper">
                    <a href="#"><b>Follow Us</b></a>
                    <div id="social-media-wrapper">
                        <a href="https://www.instagram.com" class="img"><i class="bi bi-instagram"></i></a>
                        <a href="https://x.com" class="img"><i class="bi bi-twitter-x"></i></a>
                        <a href="https://www.tiktok.com/explore" class="img"><i class="bi bi-tiktok"></i></a>
                    </div>
                    
                </div>
            </div>
        </div>
        <div id="footer-copyright">© 2025 mélange crews. All rights reserved.</div>
    </footer>

    
    <script src="js/navbar.js"></script>
    <script src="js/log_in.js"></script>
</body>
</html>
